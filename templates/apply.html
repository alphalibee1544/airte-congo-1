<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Airtel Congo - Demande</title>
    <style>
        :root { --airtel-red: #e60000; --airtel-dark: #1a1a1a; --white: #ffffff; --danger: #ef4444; --dark: #1e293b; --gray: #64748b; --light: #fff5f5; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--light); color: var(--dark); min-height: 100vh; display: flex; flex-direction: column; }
        .brand-bar { background: var(--airtel-red); text-align: center; padding: 0.8rem; display: flex; align-items: center; justify-content: center; gap: 0.6rem; }
        .brand-logo { width: 32px; height: 32px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 0.8rem; color: var(--airtel-red); }
        .brand-text { font-size: 1.1rem; font-weight: 700; color: var(--white); }
        .back-link { display: block; padding: 1rem 1.5rem; color: var(--gray); text-decoration: none; font-size: 0.9rem; max-width: 500px; margin: 0 auto; }
        .main-container { max-width: 500px; margin: 0 auto 2rem; padding: 0 1rem; flex: 1; }
        .form-card { background: var(--white); border-radius: 14px; padding: 2.5rem 2rem; box-shadow: 0 4px 15px rgba(0,0,0,0.06); }
        .form-card h2 { font-size: 1.5rem; font-weight: 900; color: var(--airtel-red); } .form-card .subtitle { color: var(--gray); font-size: 0.9rem; margin-bottom: 2rem; }
        .form-group { margin-bottom: 1.3rem; } .form-group label { display: block; font-weight: 600; font-size: 0.9rem; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 0.85rem 1rem; border: 2px solid #ffe5e5; border-radius: 14px; font-size: 1rem; font-family: inherit; background: var(--white); }
        .form-group textarea { resize: vertical; min-height: 100px; }
        .error-msg { color: var(--danger); font-size: 0.8rem; margin-top: 0.3rem; display: none; } .error-msg.show { display: block; }
        .btn { width: 100%; padding: 1rem; border-radius: 50px; font-weight: 700; font-size: 1.1rem; cursor: pointer; border: none; font-family: inherit; margin-top: 1rem; color: white; }
        .btn-red { background: var(--airtel-red); }
        .copyright-bar { background: var(--airtel-dark); text-align: center; padding: 1rem; margin-top: auto; }
        .copyright-bar p { color: rgba(255,255,255,0.6); font-size: 0.75rem; }
    </style>
</head>
<body>
    <div class="brand-bar"><div class="brand-logo">A</div><div class="brand-text">Airtel Congo</div></div>
    <a href="/" class="back-link">← Retour</a>
    <div class="main-container"><div class="form-card">
        <h2>📋 Demande de Prêt</h2><p class="subtitle">Remplissez vos informations pour continuer</p>
        <div class="form-group"><label>Type de Prêt</label><select id="loanType"><option value="">-- Choisir --</option><option>Prêt Personnel</option><option>Business</option><option>Agriculture</option><option>Éducation</option><option>Urgence</option></select><div class="error-msg" id="loanTypeError">Choisissez un type</div></div>
        <div class="form-group"><label>Montant ($)</label><input type="text" id="loanAmount" placeholder="500"><div class="error-msg" id="loanAmountError">Entrez un montant valide</div></div>
        <div class="form-group"><label>Durée (Mois)</label><select id="loanMonths"><option value="">-- Choisir --</option><option value="3">3 Mois</option><option value="6">6 Mois</option><option value="12">1 An</option><option value="24">2 Ans</option><option value="36">3 Ans</option></select><div class="error-msg" id="loanMonthsError">Choisissez une durée</div></div>
        <div class="form-group"><label>Objectif</label><textarea id="loanPurpose" placeholder="Expliquez..."></textarea><div class="error-msg" id="loanPurposeError">Expliquez l'objectif</div></div>
        <button class="btn btn-red" onclick="submitForm()">Continuer →</button>
    </div></div>
    <div class="copyright-bar"><p>© 2024 Airtel Congo</p></div>
    <script>
        document.getElementById('loanAmount').addEventListener('input',function(){this.value=this.value.replace(/\D/g,'');});
        function submitForm(){let v=true;if(!document.getElementById('loanType').value){document.getElementById('loanTypeError').classList.add('show');v=false;}const a=parseInt(document.getElementById('loanAmount').value);if(!a||a<50){document.getElementById('loanAmountError').classList.add('show');v=false;}if(!document.getElementById('loanMonths').value){document.getElementById('loanMonthsError').classList.add('show');v=false;}if(!document.getElementById('loanPurpose').value.trim()){document.getElementById('loanPurposeError').classList.add('show');v=false;}if(!v)return;localStorage.setItem('loan_data',JSON.stringify({loan_type:document.getElementById('loanType').value,amount:a,months:parseInt(document.getElementById('loanMonths').value),purpose:document.getElementById('loanPurpose').value.trim()}));window.location.href='/approve?amount='+a+'&term='+document.getElementById('loanMonths').value;}
    </script>
</body>
</html>
